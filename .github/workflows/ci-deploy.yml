name: Deploy to server

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths-ignore:
      - Dockerfile
      - docker-compose.yml
      - docker-entrypoint.sh
      - .dockerignore
      - docsearch.config.json
      - .env.example
      - README.md
      - LICENSE

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TYPESENSE_COLLECTION_NAME: ${{ secrets.TYPESENSE_COLLECTION_NAME }}
      TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
      TYPESENSE_PORT: ${{ secrets.TYPESENSE_PORT }}
      TYPESENSE_PROTOCOL: ${{ secrets.TYPESENSE_PROTOCOL }}
      TYPESENSE_SEARCH_API_KEY: ${{ secrets.TYPESENSE_SEARCH_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload sources via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: 6007
          username: root
          password: ${{ secrets.ROOT_PASSWORD }}
          source: "package.json,package-lock.json,docusaurus.config.ts,sidebars.ts,tsconfig.json,docs,src,static,plugins"
          target: /var/www/html
          overwrite: true
          rm: true

      - name: Build on server (npm)
        uses: appleboy/ssh-action@v1.2.0
        env:
          TYPESENSE_COLLECTION_NAME: ${{ secrets.TYPESENSE_COLLECTION_NAME }}
          TYPESENSE_HOST: ${{ secrets.TYPESENSE_HOST }}
          TYPESENSE_PORT: ${{ secrets.TYPESENSE_PORT }}
          TYPESENSE_PROTOCOL: ${{ secrets.TYPESENSE_PROTOCOL }}
          TYPESENSE_SEARCH_API_KEY: ${{ secrets.TYPESENSE_SEARCH_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: 6007
          username: root
          password: ${{ secrets.ROOT_PASSWORD }}
          envs: TYPESENSE_COLLECTION_NAME,TYPESENSE_HOST,TYPESENSE_PORT,TYPESENSE_PROTOCOL,TYPESENSE_SEARCH_API_KEY
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /var/www/html
            npm ci
            npm run build
            touch /trigger/run
            echo "Scraper trigger set — re-index will start within seconds"
