name: CI + Deploy (SSH)

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH (password)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: 22
          username: root
          password: ${{ secrets.ROOT_PASSWORD }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            REMOTE_PATH="${{ vars.REMOTE_PATH }}"
            if [ -z "$REMOTE_PATH" ]; then
              REMOTE_PATH="/var/www/html"
            fi
            cd "$REMOTE_PATH"

            # Ensure repo is up to date with the exact commit that triggered this workflow
            git fetch --all --prune
            git fetch origin "${{ github.sha }}"
            git checkout -f "${{ github.sha }}"

            npm ci
            npm run build
